<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nueces County — Motivated Seller Leads</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --border: #334155;
    --fg: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8;
    --good: #22c55e; --warn: #f59e0b; --bad: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
           Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg); color: var(--fg);
  }
  header {
    padding: 20px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  header h1 { margin: 0; font-size: 20px; }
  header .meta { color: var(--muted); font-size: 13px; }
  .stats { display: flex; gap: 24px; padding: 16px 28px;
           border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .v { font-size: 22px; font-weight: 600; }
  .stat .k { color: var(--muted); font-size: 12px;
             text-transform: uppercase; letter-spacing: .04em; }
  .controls { padding: 12px 28px; display: flex; gap: 10px;
              flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  .controls input, .controls select {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--fg); padding: 6px 10px; border-radius: 4px; font: inherit;
  }
  .controls input { min-width: 220px; }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    padding: 8px 10px; text-align: left;
    border-bottom: 1px solid var(--border); vertical-align: top;
  }
  th { background: var(--panel); cursor: pointer; user-select: none;
       position: sticky; top: 0; }
  th:hover { color: var(--accent); }
  td.score { font-weight: 600; }
  tr:hover { background: rgba(56,189,248,.06); }
  .pill {
    display: inline-block; padding: 1px 6px; margin: 1px 2px;
    border-radius: 10px; background: rgba(245,158,11,.15);
    color: var(--warn); font-size: 11px; white-space: nowrap;
  }
  .score-hi { color: var(--good); }
  .score-md { color: var(--warn); }
  .score-lo { color: var(--muted); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .empty { padding: 60px 28px; text-align: center; color: var(--muted); }
  .legal { max-width: 280px; font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
<header>
  <div>
    <h1>Nueces County — Motivated Seller Leads</h1>
    <div class="meta" id="meta">Loading…</div>
  </div>
  <div class="meta">Source: Nueces County Clerk + NCAD bulk parcel data</div>
</header>

<div class="stats" id="stats"></div>

<div class="controls">
  <input id="q" placeholder="Search owner / address / doc# / legal…">
  <select id="cat">
    <option value="">All categories</option>
  </select>
  <select id="sort">
    <option value="score">Sort: Score (highest first)</option>
    <option value="filed">Sort: Filed (newest first)</option>
    <option value="amount">Sort: Amount (highest first)</option>
  </select>
</div>

<table id="t">
  <thead>
    <tr>
      <th data-k="score">Score</th>
      <th data-k="filed">Filed</th>
      <th data-k="cat_label">Category</th>
      <th data-k="doc_type">Doc Type</th>
      <th data-k="owner">Owner (Grantor)</th>
      <th data-k="prop_address">Property Address</th>
      <th data-k="mail_address">Mailing Address</th>
      <th data-k="amount">Amount</th>
      <th>Flags</th>
      <th>Doc#</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="empty" class="empty" hidden>
  No records yet. The scraper runs daily at 07:00 UTC.
</div>

<script>
let RAW = [], FILTERED = [];

async function load() {
  try {
    const r = await fetch("records.json", {cache: "no-store"});
    const data = await r.json();
    RAW = data.records || [];
    document.getElementById("meta").textContent =
      data.fetched_at
        ? `Last update: ${new Date(data.fetched_at).toLocaleString()}` +
          (data.date_range && data.date_range.start
            ? ` • Range: ${data.date_range.start} → ${data.date_range.end}` : "")
        : "Awaiting first scrape";
    renderStats(data);
    populateCats();
    apply();
  } catch (e) {
    document.getElementById("meta").textContent = "Failed to load records.json";
  }
}

function renderStats(data) {
  const el = document.getElementById("stats");
  const hot = (data.records || []).filter(r => r.score >= 70).length;
  const fc  = (data.records || []).filter(r => r.cat === "NOFC").length;
  const lp  = (data.records || []).filter(r => r.cat === "LP").length;
  el.innerHTML = `
    <div class="stat"><div class="v">${data.total || 0}</div><div class="k">Total leads</div></div>
    <div class="stat"><div class="v">${data.with_address || 0}</div><div class="k">With property address</div></div>
    <div class="stat"><div class="v">${hot}</div><div class="k">Score ≥ 70</div></div>
    <div class="stat"><div class="v">${lp}</div><div class="k">Lis pendens</div></div>
    <div class="stat"><div class="v">${fc}</div><div class="k">Foreclosures</div></div>
  `;
}

function populateCats() {
  const sel = document.getElementById("cat");
  const seen = new Set();
  for (const r of RAW) {
    if (r.cat_label && !seen.has(r.cat_label)) {
      seen.add(r.cat_label);
      const o = document.createElement("option");
      o.value = r.cat; o.textContent = r.cat_label;
      sel.appendChild(o);
    }
  }
}

function apply() {
  const q = document.getElementById("q").value.toLowerCase().trim();
  const cat = document.getElementById("cat").value;
  const sort = document.getElementById("sort").value;
  FILTERED = RAW.filter(r => {
    if (cat && r.cat !== cat) return false;
    if (!q) return true;
    return [r.owner, r.grantee, r.prop_address, r.mail_address,
            r.doc_num, r.doc_type, r.legal]
      .some(v => (v || "").toLowerCase().includes(q));
  });
  if (sort === "score") FILTERED.sort((a,b) => (b.score||0) - (a.score||0));
  else if (sort === "filed") FILTERED.sort((a,b) => (b.filed||"").localeCompare(a.filed||""));
  else if (sort === "amount") FILTERED.sort((a,b) => (b.amount||0) - (a.amount||0));
  render();
}

function render() {
  const tb = document.querySelector("#t tbody");
  tb.innerHTML = "";
  document.getElementById("empty").hidden = FILTERED.length > 0;
  for (const r of FILTERED) {
    const tr = document.createElement("tr");
    const sc = r.score || 0;
    const scClass = sc >= 70 ? "score-hi" : sc >= 50 ? "score-md" : "score-lo";
    tr.innerHTML = `
      <td class="score ${scClass}">${sc}</td>
      <td>${esc(r.filed || "")}</td>
      <td>${esc(r.cat_label || r.cat || "")}</td>
      <td>${esc(r.doc_type || "")}</td>
      <td>${esc(r.owner || "")}</td>
      <td>${esc(r.prop_address || "")}${r.prop_city ? "<br><small>" + esc(r.prop_city + " " + (r.prop_zip||"")) + "</small>" : ""}</td>
      <td>${esc(r.mail_address || "")}${r.mail_city ? "<br><small>" + esc(r.mail_city + " " + (r.mail_state||"") + " " + (r.mail_zip||"")) + "</small>" : ""}</td>
      <td>${r.amount ? "$" + Number(r.amount).toLocaleString() : ""}</td>
      <td>${(r.flags || []).map(f => `<span class="pill">${esc(f)}</span>`).join("")}</td>
      <td>${r.clerk_url ? `<a href="${esc(r.clerk_url)}" target="_blank" rel="noopener">${esc(r.doc_num || "view")}</a>` : esc(r.doc_num || "")}</td>
    `;
    tb.appendChild(tr);
  }
}

function esc(s) {
  return String(s).replace(/[&<>"]/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

document.getElementById("q").oninput = apply;
document.getElementById("cat").onchange = apply;
document.getElementById("sort").onchange = apply;
load();
</script>
</body>
</html>
