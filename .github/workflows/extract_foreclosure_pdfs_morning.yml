name: Extract foreclosure PDFs (morning batch)

# Runs at 9:00 AM Central (14:00 UTC during DST).
# Downloads up to 10 foreclosure PDFs, extracts owner + address,
# cross-references against NCAD by legal description when needed.
#
# Manual trigger also enabled — useful for testing.
#
# Pairs with extract_foreclosure_pdfs_evening.yml (4 PM Central run).
# Total: 20 PDFs/day at human-like cadence.

on:
  workflow_dispatch:
    inputs:
      max_downloads:
        description: "Max PDFs to download this run (default 10, set to 2 for a smoke test)"
        required: false
        default: "10"
  schedule:
    # 14:00 UTC = 9:00 AM CDT (Central Daylight Time).
    # Drift to 8:00 AM CST during winter is acceptable.
    - cron: "0 14 * * *"

permissions:
  contents: write

concurrency:
  group: "pdf-extraction"
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-22.04
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run foreclosure PDF extraction
        env:
          LOG_LEVEL: INFO
          PYTHONUNBUFFERED: "1"
          CLERK_USERNAME: ${{ secrets.CLERK_USERNAME }}
          CLERK_PASSWORD: ${{ secrets.CLERK_PASSWORD }}
          PDF_MAX_DOWNLOADS: ${{ github.event.inputs.max_downloads || '10' }}
        run: python scraper/extract_foreclosure_pdfs.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foreclosure-pdf-debug-morning
          path: |
            debug/
            .cache/pdf_extractions.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit enriched foreclosure data
        run: |
          git config user.name  "nueces-leads-bot"
          git config user.email "actions@github.com"
          mkdir -p .cache
          git add \
            data/foreclosures.json dashboard/foreclosures.json \
            .cache/pdf_extractions.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: foreclosure PDF extraction (morning) $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
