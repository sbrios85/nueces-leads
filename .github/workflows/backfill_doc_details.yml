name: Backfill clerk doc details (one-shot)

# This workflow is manual-only. It enriches the cumulative
# data/city_liens.json file with consideration + instrument_date
# fetched from each document's detail page on the clerk portal.
#
# Resumable across runs via .cache/clerk_doc_details.json — re-run
# this workflow until every CCLN record has its consideration filled.
# Typically 2-3 runs are needed to cover ~1900 records.
#
# To run: Actions tab → "Backfill clerk doc details (one-shot)" →
#   "Run workflow" (green button).

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: "doc-details-backfill"
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run doc-details backfill
        env:
          LOG_LEVEL: INFO
          PYTHONUNBUFFERED: "1"
        run: python scraper/backfill_doc_details.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doc-details-debug
          path: debug/
          if-no-files-found: ignore

      - name: Commit enriched city liens + cache
        run: |
          git config user.name  "nueces-leads-bot"
          git config user.email "actions@github.com"
          mkdir -p .cache
          git add \
            data/city_liens.json dashboard/city_liens.json \
            .cache/clerk_doc_details.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: backfill doc details $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
