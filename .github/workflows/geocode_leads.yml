name: Geocode leads (Census)

# Adds prop_lat / prop_lng to Mortgage Foreclosure, Tax Foreclosure,
# and CCLN records using the free U.S. Census batch geocoder, so the
# Map view can plot them. Idempotent: only records lacking coordinates
# (and having a usable address) are sent each run, so daily runs just
# pick up the handful of new leads.
#
# Triggers:
#   1. Manual (workflow_dispatch) — apply / force toggles, dry-run default.
#   2. Automatic (workflow_run) — after either scrape that refreshes one
#      of the three datasets finishes:
#         "Scrape Nueces leads"            (refreshes FC + CCLN)
#         "Scrape Tax Foreclosures (LGBS)" (rebuilds TFC)
#      Auto-runs apply with force OFF (new records only).
#
# Pages is served from a GitHub Actions deployment, so this workflow
# deploys Pages itself after writing coordinates.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Write coordinates into the JSON (false = dry-run report only)"
        type: boolean
        default: false
      force:
        description: "Re-geocode records that already have coordinates"
        type: boolean
        default: false
  workflow_run:
    workflows: ["Scrape Nueces leads", "Scrape Tax Foreclosures (LGBS)"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

# Share the repo-push lock with the scrapers / enrichers so two
# workflows never push at once.
concurrency:
  group: "ncad-cache-write"
  cancel-in-progress: false

jobs:
  geocode:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Manual runs always proceed. Auto-runs only if the scrape succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest (catch checkout race)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        # Only needs `requests`; install the full requirements for cache
        # consistency with the other workflows.
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Census geocoder
        env:
          # Auto-runs always apply, force OFF. Manual runs honor inputs.
          GEOCODE_APPLY: ${{ (github.event_name == 'workflow_run' || inputs.apply) && '1' || '0' }}
          GEOCODE_FORCE: ${{ inputs.force && '1' || '0' }}
        run: python scraper/geocode_leads.py

      - name: Commit coordinates
        if: ${{ github.event_name == 'workflow_run' || inputs.apply }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            dashboard/foreclosures.json data/foreclosures.json \
            dashboard/tfc.json data/tfc.json \
            dashboard/city_liens.json data/city_liens.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new coordinates to commit."
          else
            git commit -m "Geocode: add prop_lat/prop_lng (${{ github.event_name }})"
            git push
          fi

      - name: Upload dashboard artifact for Pages deploy
        if: ${{ github.event_name == 'workflow_run' || inputs.apply }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: geocode
    if: ${{ needs.geocode.result == 'success' && (github.event_name == 'workflow_run' || inputs.apply) }}
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
