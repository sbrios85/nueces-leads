name: Enrich FC NCAD (account numbers)

# Backfills the dashed 12-digit NCAD account number (Geographic ID)
# onto mortgage-foreclosure records via the property detail page, so
# the dashboard's NCTAX column can deep-link to the tax office.
#
# Triggers:
#   1. Manual (workflow_dispatch) — apply / force, dry-run by default.
#   2. Automatic (workflow_run) — fires when "Scrape Nueces leads"
#      finishes. That scrape runs fetch.py, which sets the FC prop_ids
#      and commits foreclosures.json; this enricher then reads those
#      fresh prop_ids and adds the account numbers. Auto-runs apply
#      with force OFF, so records that already have an account number
#      are skipped — only the genuinely new foreclosures are fetched
#      (idempotent, usually just a handful per day).
#
# Pages is served from a GitHub Actions deployment, so committing
# alone won't update the live dashboard — this workflow deploys Pages
# itself after an apply/auto run.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Write foreclosures.json (false = dry-run, log only)"
        type: boolean
        default: false
      force:
        description: "Re-read records that already have an account number"
        type: boolean
        default: false
  workflow_run:
    workflows: ["Scrape Nueces leads"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "ncad-cache-write"
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest (catch checkout race)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run FC NCAD account enricher
        env:
          ENRICH_FC_APPLY: ${{ (github.event_name == 'workflow_run' || inputs.apply) && '1' || '0' }}
          ENRICH_FC_FORCE: ${{ inputs.force && '1' || '0' }}
        run: python scraper/enrich_fc_ncad.py

      - name: Commit results
        if: ${{ github.event_name == 'workflow_run' || inputs.apply }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dashboard/foreclosures.json data/foreclosures.json data/enrich_fc_ncad_log.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "FC: NCAD account-number enrichment pass (${{ github.event_name }})"
            git push
          fi

      - name: Upload dashboard artifact for Pages deploy
        if: ${{ github.event_name == 'workflow_run' || inputs.apply }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Upload enrichment log (always, for dry-run review)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enrich-fc-ncad-log
          path: data/enrich_fc_ncad_log.json
          if-no-files-found: ignore

  deploy:
    needs: enrich
    if: ${{ needs.enrich.result == 'success' && (github.event_name == 'workflow_run' || inputs.apply) }}
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
