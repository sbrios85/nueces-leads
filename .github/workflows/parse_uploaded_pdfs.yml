name: Parse uploaded foreclosure PDFs

# Manual trigger only. After uploading PDFs to pdfs/foreclosures/ via
# GitHub's web UI, run this workflow to parse them. Successfully-parsed
# PDFs are deleted from the folder; unprocessed PDFs are left in place
# with a log warning explaining why.
#
# After parsing, this workflow also triggers a GitHub Pages redeploy
# so the dashboard reflects the new data immediately.

on:
  workflow_dispatch:
    inputs:
      overwrite:
        description: 'Overwrite existing fields (use after parser bug fixes)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write   # for committing parsed data back to the repo
  pages: write      # for the Pages deploy
  id-token: write   # for the Pages deploy

concurrency:
  group: "pdf-parsing"
  cancel-in-progress: false

jobs:
  parse:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install OCR system packages (tesseract + poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright + Chromium (for NCAD cross-reference)
        run: python -m playwright install --with-deps chromium

      - name: Parse uploaded PDFs
        env:
          LOG_LEVEL: INFO
          PYTHONUNBUFFERED: "1"
          PDF_OVERWRITE: ${{ inputs.overwrite }}
          # OCR up to 3 pages per PDF. Most foreclosure notices put the
          # critical fields (borrower, lender, address, legal description)
          # on page 1, but some templates split details across pages 1-3.
          # Increasing the page count adds ~10s per page per PDF.
          PDF_OCR_MAX_PAGES: "3"
        run: python scraper/extract_uploaded_pdfs.py

      - name: Upload OCR debug output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-debug-output
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit parsed data + cleanup
        run: |
          git config user.name  "nueces-leads-bot"
          git config user.email "actions@github.com"
          git add \
            data/foreclosures.json dashboard/foreclosures.json \
            pdfs/foreclosures/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: parse foreclosure PDFs $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi

      - name: Upload dashboard artifact for Pages deploy
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: parse
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
