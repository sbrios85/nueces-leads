name: Scrape Nueces leads

on:
  schedule:
    - cron: "0 7 * * *"      # daily at 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write             # to commit records.json back to the repo
  pages: write                # for the Pages deploy
  id-token: write             # for the Pages deploy

concurrency:
  group: "scrape"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOG_LEVEL: INFO
          PYTHONUNBUFFERED: "1"
        run: python scraper/fetch.py

      - name: Commit updated records
        run: |
          git config user.name  "nueces-leads-bot"
          git config user.email "actions@github.com"
          git add dashboard/records.json data/records.json data/leads_for_ghl.csv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: refresh leads $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
