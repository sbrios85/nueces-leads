name: Scrape Nueces leads

on:
  schedule:
    - cron: "0 7 * * *"      # daily at 07:00 UTC
  workflow_dispatch:
    inputs:
      full_backfill:
        description: "One-time full backfill (walk every page, ignore short-circuit). Leave OFF for normal daily runs."
        type: boolean
        default: false

permissions:
  contents: write             # to commit records.json back to the repo
  pages: write                # for the Pages deploy
  id-token: write             # for the Pages deploy

concurrency:
  group: "ncad-cache-write"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest (catch checkout race)
        # See comment in foreclosure_esearch_only.yml. Belt-and-
        # suspenders defense alongside the shared concurrency group.
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOG_LEVEL: INFO
          PYTHONUNBUFFERED: "1"
          FORECLOSURE_FULL_BACKFILL: ${{ inputs.full_backfill && '1' || '' }}
        run: python scraper/fetch.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: debug/
          if-no-files-found: ignore

      - name: Commit updated records
        run: |
          git config user.name  "nueces-leads-bot"
          git config user.email "actions@github.com"
          mkdir -p .cache
          git add \
            dashboard/records.json data/records.json data/leads_for_ghl.csv \
            dashboard/foreclosures.json data/foreclosures.json data/foreclosures.csv \
            data/city_liens.json dashboard/city_liens.json \
            .cache/ncad_search_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: refresh leads $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi

      - name: Apply corporate-owner cleanup to CCLN
        # Runs every scrape (idempotent: ~2s no-op when nothing to clean).
        # Catches both newly-scraped corporate owners AND old records that
        # match classifier patterns added since they were ingested.
        # Script commits + pushes its own changes if any records are removed.
        run: python scraper/cleanup_corporate_ccln.py

      - name: Pull latest after cleanup (catch own push)
        # cleanup_corporate_ccln.py may have pushed a commit; refresh local
        # working tree so the Pages artifact upload sees the cleaned JSON.
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
