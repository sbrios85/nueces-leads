name: Scrape Nueces leads

on:
  schedule:
    - cron: "0 16 * * *"     # daily at 16:00 UTC = 11:00 AM CDT (10:00 AM CST after DST ends)
  workflow_dispatch:
    inputs:
      full_backfill:
        description: "One-time full backfill (walk every page, ignore short-circuit). Leave OFF for normal daily runs."
        type: boolean
        default: false
      esearch_retry_misses:
        description: "One-time: re-attempt NCAD esearch lookups previously cached as misses (None). Use after matcher-logic changes to recover stale negatives. Leave OFF for normal runs."
        type: boolean
        default: false
      skip_ccln_enrichment:
        description: "Skip the daily CCLN→NCAD enrichment step (the one that attaches ncad_prop_id + corrects account numbers to new liens). Default OFF — enrichment runs every day, idempotent (already-enriched records skip in ~ms)."
        type: boolean
        default: false

permissions:
  contents: write             # to commit records.json back to the repo
  pages: write                # for the Pages deploy
  id-token: write             # for the Pages deploy

concurrency:
  group: "ncad-cache-write"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest (catch checkout race)
        # See comment in foreclosure_esearch_only.yml. Belt-and-
        # suspenders defense alongside the shared concurrency group.
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOG_LEVEL: INFO
          PYTHONUNBUFFERED: "1"
          FORECLOSURE_FULL_BACKFILL: ${{ inputs.full_backfill && '1' || '' }}
          ESEARCH_RETRY_MISSES: ${{ inputs.esearch_retry_misses && '1' || '' }}
        run: python scraper/fetch.py

      - name: Enrich new CCLN liens with NCAD (idempotent)
        # Attaches ncad_prop_id / ncad_owner_id and CORRECTS the
        # OCR'd ncad_account_num on any CCLN records the scraper just
        # added. The script is fully idempotent: records that already
        # have ncad_prop_id are skipped (unless force=true), and the
        # shared NCAD cache (.cache/ncad_search_cache.json) means
        # previously-seen addresses skip in ~ms. Typical daily
        # incremental: <30 new addresses, ~1-2 min.
        #
        # continue-on-error: a NCAD hiccup must not block the scrape
        # commit. New CCLN rows still ship with the OCR'd account
        # number; the dashboard's _ambiguousAccounts guard catches
        # any OCR collisions until next successful enrichment.
        if: ${{ !inputs.skip_ccln_enrichment }}
        continue-on-error: true
        env:
          LOG_LEVEL: INFO
          PYTHONUNBUFFERED: "1"
          # No fetch_mail in the daily auto-run — CCLN records already
          # carry mail_address from the lien-PDF OCR, and the detail
          # fetch ~doubles per-address time. Run the manual workflow
          # with fetch_mail=true if you want to backfill mailing
          # addresses for a specific batch.
          CCLN_ENRICH_NO_MAIL: "1"
        run: python scraper/enrich_ccln_ncad.py

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug
          path: debug/
          if-no-files-found: ignore

      - name: Commit updated records
        run: |
          git config user.name  "nueces-leads-bot"
          git config user.email "actions@github.com"
          mkdir -p .cache
          git add \
            dashboard/records.json data/records.json data/leads_for_ghl.csv \
            dashboard/foreclosures.json data/foreclosures.json data/foreclosures.csv \
            data/city_liens.json dashboard/city_liens.json \
            data/ccln_enrichment_audit_*.json \
            .cache/ncad_search_cache.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: refresh leads $(date -u +'%Y-%m-%dT%H:%MZ')"
            # main can move during the ~12-min run (the Backfill workflow,
            # or a manual index.html upload). A bare `git push` then dies
            # with a non-fast-forward "fetch first" rejection and loses the
            # whole scrape. Instead: rebase our data commit on top of the
            # latest remote and retry. If main moves again between rebase
            # and push, the loop re-fetches and tries again.
            pushed=0
            for attempt in 1 2 3 4 5; do
              git fetch origin main
              if ! git rebase origin/main; then
                git rebase --abort || true
                echo "rebase hit a real conflict on attempt $attempt — leaving it for a fresh run rather than guessing"
                exit 1
              fi
              if git push origin HEAD:main; then
                echo "push succeeded on attempt $attempt"
                pushed=1
                break
              fi
              echo "push attempt $attempt rejected (remote moved again); backing off and retrying..."
              sleep $((RANDOM % 8 + 3))
            done
            if [ "$pushed" != "1" ]; then
              echo "push still failing after 5 attempts"
              exit 1
            fi
          fi

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: scrape
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
